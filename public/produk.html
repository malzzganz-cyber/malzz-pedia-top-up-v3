<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f9f6f1">
<title>Produk — Malzz Pedia</title>
<link rel="stylesheet" href="/style.css">
<style>
.prod-hdr{padding:22px 20px 16px;}
.prod-hdr h1{font-size:1.7rem;color:var(--ink);}
.sbar{padding:0 20px 14px;position:sticky;top:56px;z-index:50;background:rgba(249,246,241,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding-top:12px;}
.sw{position:relative;}
.sw .input{padding-left:38px;}
.si{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:0.88rem;color:var(--stone);}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 20px 24px;}
.pc{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;animation:fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) both;-webkit-tap-highlight-color:transparent;}
.pc:active{transform:scale(0.97);}
.pth{width:100%;aspect-ratio:1;background:var(--cream-2);display:flex;align-items:center;justify-content:center;font-size:2.5rem;}
.pthi{width:100%;aspect-ratio:1;object-fit:cover;background:var(--cream-2);}
.pi{padding:10px 12px 12px;display:flex;flex-direction:column;gap:3px;}
.pn{font-family:'Playfair Display',serif;font-size:0.86rem;color:var(--ink);line-height:1.3;}
.ps{font-size:0.7rem;color:var(--stone);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pl{font-size:0.7rem;color:var(--accent);font-weight:500;margin-top:4px;}
.sk-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;}
.empty{text-align:center;padding:48px 20px;color:var(--stone-2);grid-column:1/-1;}
.empty .ic{font-size:2.5rem;margin-bottom:12px;}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo">Malzz <em>Pedia</em></a>
  <a href="/topup" class="nav-cta">Top Up</a>
</nav>
<div class="page-wrap">
  <div class="prod-hdr anim-up"><span class="eyebrow">Katalog</span><h1>Semua Produk</h1></div>
  <div class="sbar"><div class="sw"><span class="si">🔍</span><input type="text" class="input" id="si" placeholder="Cari game atau layanan..." oninput="filter(this.value)"></div></div>
  <div class="pg" id="skel">
    <div class="sk-card"><div class="skeleton" style="width:100%;aspect-ratio:1;"></div><div style="padding:10px 12px;"><div class="skeleton" style="height:13px;width:70%;margin-bottom:6px;"></div><div class="skeleton" style="height:10px;width:50%;"></div></div></div>
    <div class="sk-card"><div class="skeleton" style="width:100%;aspect-ratio:1;"></div><div style="padding:10px 12px;"><div class="skeleton" style="height:13px;width:65%;margin-bottom:6px;"></div><div class="skeleton" style="height:10px;width:45%;"></div></div></div>
    <div class="sk-card"><div class="skeleton" style="width:100%;aspect-ratio:1;"></div><div style="padding:10px 12px;"><div class="skeleton" style="height:13px;width:75%;margin-bottom:6px;"></div><div class="skeleton" style="height:10px;width:40%;"></div></div></div>
    <div class="sk-card"><div class="skeleton" style="width:100%;aspect-ratio:1;"></div><div style="padding:10px 12px;"><div class="skeleton" style="height:13px;width:60%;margin-bottom:6px;"></div><div class="skeleton" style="height:10px;width:55%;"></div></div></div>
  </div>
  <div class="pg" id="pg" style="display:none;"></div>
  <footer class="site-footer"><div class="footer-logo">Malzz <em>Pedia</em></div><div class="footer-links"><a href="/topup">Top Up</a><a href="/status">Status</a><a href="/panduan">Panduan</a></div><div class="footer-copy">© 2025 Malzz Pedia</div></footer>
</div>
<nav class="bottom-nav">
  <a href="/" class="bnav-item"><span class="bnav-icon">🏠</span><span class="bnav-label">Home</span></a>
  <a href="/products" class="bnav-item active"><span class="bnav-icon">🎮</span><span class="bnav-label">Produk</span></a>
  <a href="/topup" class="bnav-item"><span class="bnav-icon">⚡</span><span class="bnav-label">Top Up</span></a>
  <a href="/status" class="bnav-item"><span class="bnav-icon">🔍</span><span class="bnav-label">Status</span></a>
  <a href="/panduan" class="bnav-item"><span class="bnav-icon">📖</span><span class="bnav-label">Panduan</span></a>
</nav>
<script>
let all=[];
async function load(){try{const res=await fetch('/produk'),data=await res.json();document.getElementById('skel').style.display='none';if(data.success&&data.data.length){all=data.data;render(all);}else{document.getElementById('pg').style.display='grid';document.getElementById('pg').innerHTML='<div class="empty"><div class="ic">🎮</div><p>Belum ada produk.</p></div>';}}catch{document.getElementById('skel').innerHTML='<p style="color:var(--stone);font-size:0.85rem;grid-column:1/-1;">Gagal memuat.</p>';}}
function render(list){const g=document.getElementById('pg');if(!list.length){g.style.display='grid';g.innerHTML='<div class="empty"><div class="ic">🎮</div><p>Tidak ditemukan.</p></div>';return;}g.style.display='grid';g.innerHTML=list.map((p,i)=>`<a href="${p.linkorder||'/topup'}" class="pc" style="animation-delay:${i*0.05}s">${p.imageurl?`<img src="${p.imageurl}" class="pthi" alt="${p.nama}" onerror="this.outerHTML='<div class=pth>🎮</div>'">`:'<div class="pth">🎮</div>'}<div class="pi"><div class="pn">${p.nama}</div><div class="ps">${p.deks||p.fulldesk||''}</div><div class="pl">Top up →</div></div></a>`).join('');}
function filter(q){render(all.filter(p=>p.nama.toLowerCase().includes(q.toLowerCase())||(p.deks||'').toLowerCase().includes(q.toLowerCase())));}
load();
</script>
</body>
</html>
